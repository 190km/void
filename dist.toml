[dist]
cargo-dist-version = "0.30.3"
ci = ["github"]
installers = ["shell", "powershell", "msi"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
install-path = ["$LOCALAPPDATA/Programs/Void", "~/.local/bin"]

[dist.dependencies.apt]
libasound2-dev = "*"
libudev-dev = "*"
libwayland-dev = "*"
libx11-dev = "*"
libxcursor-dev = "*"
libxi-dev = "*"
libxinerama-dev = "*"
libxkbcommon-dev = "*"
libxrandr-dev = "*"
pkg-config = "*"
