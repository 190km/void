name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Build Windows + NSIS installer ────────────────────────────────
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists. Bump the version in Cargo.toml first."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-release

      - name: Build
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Build NSIS installer
        shell: pwsh
        run: |
          Copy-Item "target\x86_64-pc-windows-msvc\release\void.exe" "installer\void.exe"
          makensis /DVERSION=$env:VERSION installer\void.nsi
          Write-Host "Installer created:"
          Get-Item "installer\void-$env:VERSION-x86_64-setup.exe" | Select-Object Name, Length

      - name: Create tag
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create release and upload installer
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}" \
            "installer/void-${VERSION}-x86_64-setup.exe"
