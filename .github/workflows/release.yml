name: Release
run-name: "release: v${{ inputs.version || '(auto from Cargo.toml)' }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to use Cargo.toml)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Create draft release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "Version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        run: |
          VERSION="v${{ steps.get-version.outputs.version }}"
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
          fi
          # Group by prefix
          FEATS=$(echo "$COMMITS" | grep -i "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          REFACTORS=$(echo "$COMMITS" | grep -i "^- refactor" || true)
          OTHERS=$(echo "$COMMITS" | grep -iv "^- feat\|^- fix\|^- refactor\|^- style\|^- chore\|^- ci\|^- docs" || true)
          CHORES=$(echo "$COMMITS" | grep -i "^- chore\|^- ci\|^- style\|^- docs" || true)

          BODY=""
          [ -n "$FEATS" ] && BODY="${BODY}## Features\n${FEATS}\n\n"
          [ -n "$FIXES" ] && BODY="${BODY}## Fixes\n${FIXES}\n\n"
          [ -n "$REFACTORS" ] && BODY="${BODY}## Refactors\n${REFACTORS}\n\n"
          [ -n "$OTHERS" ] && BODY="${BODY}## Other\n${OTHERS}\n\n"
          [ -n "$CHORES" ] && BODY="${BODY}## Maintenance\n${CHORES}\n\n"

          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}**Full Changelog**: ${PREV_TAG}...${VERSION}"
          fi

          # Write to file to preserve newlines
          echo -e "$BODY" > /tmp/changelog.md
          echo "Generated changelog for ${VERSION}"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/changelog.md', 'utf8');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              body: body,
              draft: true,
              prerelease: false
            })
            return data.id

  # ── Windows x64 (NSIS installer) ─────────────────────────────────
  build-windows:
    name: Windows x64
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x64-release

      - name: Build
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          Copy-Item "target\x86_64-pc-windows-msvc\release\void.exe" "installer\void.exe"
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DVERSION=$env:VERSION installer\void.nsi

      - name: Upload
        shell: bash
        run: gh release upload "v${VERSION}" "installer/void-${VERSION}-x86_64-setup.exe" --clobber

  # ── macOS ARM64 (Apple Silicon) ──────────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64-release

      - name: Build
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package .dmg
        run: |
          APP="Void.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/aarch64-apple-darwin/release/void "$APP/Contents/MacOS/void"
          chmod +x "$APP/Contents/MacOS/void"
          cp assets/icon.png "$APP/Contents/Resources/icon.png"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Void</string>
            <key>CFBundleIdentifier</key><string>sh.void.terminal</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>void</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict></plist>
          PLIST
          mkdir -p dmg-stage
          cp -r "$APP" dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "Void" -srcfolder dmg-stage -ov -format UDZO \
            "void-${VERSION}-aarch64-apple-darwin-setup.dmg"

      - name: Upload
        run: gh release upload "v${VERSION}" "void-${VERSION}-aarch64-apple-darwin-setup.dmg" --clobber

  # ── macOS x64 (Intel) ────────────────────────────────────────────
  build-macos-x64:
    name: macOS Intel
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-x64-release

      - name: Build
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Package .dmg
        run: |
          APP="Void.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/x86_64-apple-darwin/release/void "$APP/Contents/MacOS/void"
          chmod +x "$APP/Contents/MacOS/void"
          cp assets/icon.png "$APP/Contents/Resources/icon.png"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Void</string>
            <key>CFBundleIdentifier</key><string>sh.void.terminal</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>void</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict></plist>
          PLIST
          mkdir -p dmg-stage
          cp -r "$APP" dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "Void" -srcfolder dmg-stage -ov -format UDZO \
            "void-${VERSION}-x86_64-apple-darwin-setup.dmg"

      - name: Upload
        run: gh release upload "v${VERSION}" "void-${VERSION}-x86_64-apple-darwin-setup.dmg" --clobber

  # ── Linux x64 (.deb + tar.gz) ────────────────────────────────────
  build-linux:
    name: Linux x64
    needs: create-release
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x64-release

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev libwayland-dev \
            libx11-dev libxcursor-dev libxi-dev libxinerama-dev \
            libxkbcommon-dev libxrandr-dev pkg-config

      - name: Build
        run: cargo build --release --locked

      - name: Package tar.gz
        run: |
          mkdir -p "void-${VERSION}-x86_64-linux-setup"
          cp target/release/void "void-${VERSION}-x86_64-linux-setup/"
          tar czf "void-${VERSION}-x86_64-linux-setup.tar.gz" "void-${VERSION}-x86_64-linux-setup"

      - name: Package .deb
        run: |
          PKG="void-terminal_${VERSION}_amd64"
          mkdir -p "$PKG/DEBIAN" "$PKG/usr/bin" "$PKG/usr/share/applications" "$PKG/usr/share/icons/hicolor/256x256/apps"
          cp target/release/void "$PKG/usr/bin/void"
          chmod 755 "$PKG/usr/bin/void"
          cp assets/icon.png "$PKG/usr/share/icons/hicolor/256x256/apps/void-terminal.png"

          cat > "$PKG/usr/share/applications/void-terminal.desktop" << 'EOF'
          [Desktop Entry]
          Name=Void Terminal
          Comment=Infinite Canvas Terminal
          Exec=void
          Icon=void-terminal
          Terminal=false
          Type=Application
          Categories=System;TerminalEmulator;
          EOF

          cat > "$PKG/DEBIAN/control" << EOF
          Package: void-terminal
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libasound2, libx11-6, libxcursor1, libxi6, libxrandr2, libxkbcommon0, libwayland-client0
          Maintainer: 190km <190km@void.sh>
          Description: Infinite Canvas Terminal
           GPU-accelerated terminal emulator with an infinite 2D canvas.
          Homepage: https://void.sh
          EOF

          dpkg-deb --build --root-owner-group "$PKG"
          mv "${PKG}.deb" "void-${VERSION}-x86_64-linux-setup.deb"

      - name: Upload
        run: |
          gh release upload "v${VERSION}" \
            "void-${VERSION}-x86_64-linux-setup.tar.gz" \
            "void-${VERSION}-x86_64-linux-setup.deb" \
            --clobber

  # ── Publish release ──────────────────────────────────────────────
  publish-release:
    needs:
      - create-release
      - build-windows
      - build-macos-arm64
      - build-macos-x64
      - build-linux
    if: >-
      always() &&
      needs.create-release.result == 'success' &&
      (needs.build-windows.result == 'success' ||
       needs.build-macos-arm64.result == 'success' ||
       needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false
            })
