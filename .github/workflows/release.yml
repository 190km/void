name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh | sh
      - name: Cache dist
        uses: actions/upload-artifact@v4
        with:
          name: cargo-dist-bin
          path: ~/.cargo/bin/dist
      - id: plan
        shell: bash
        run: |
          dist host --steps=create --tag="${{ github.ref_name }}" --output-format=json > plan-dist-manifest.json
          echo "manifest=$(jq -c '.' plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-local-artifacts:
    needs: plan
    if: ${{ fromJson(needs.plan.outputs.manifest).ci.github.artifacts_matrix.include != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.manifest).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Rust targets
        if: ${{ join(matrix.targets, ',') != '' }}
        run: rustup target add ${{ join(matrix.targets, ' ') }}
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        if: ${{ matrix.packages_install != '' }}
        run: ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          dist build --tag="${{ needs.plan.outputs.tag }}" --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
      - id: cargo-dist
        name: Collect upload paths
        shell: bash
        run: |
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v4
        with:
          name: cargo-dist-bin
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build --tag="${{ needs.plan.outputs.tag }}" --output-format=json --artifacts=global > dist-manifest.json
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output '.upload_files[]' dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # ── macOS .dmg ──────────────────────────────────────────────────────
  package-macos:
    needs: build-local-artifacts
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-${{ matrix.target }}
          path: dist-artifacts/
          merge-multiple: true
      - name: Create .app bundle and .dmg
        shell: bash
        run: |
          APP="Void.app"
          CONTENTS="$APP/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          mkdir -p "$MACOS" "$RESOURCES"

          # Find the binary in dist artifacts
          BINARY=$(find dist-artifacts -name "void" -type f | head -1)
          if [ -z "$BINARY" ]; then
            # Try extracting from tarball
            TARBALL=$(find dist-artifacts -name "*.tar.gz" -o -name "*.tar.xz" | head -1)
            mkdir -p extracted
            tar xf "$TARBALL" -C extracted
            BINARY=$(find extracted -name "void" -type f | head -1)
          fi

          cp "$BINARY" "$MACOS/void"
          chmod +x "$MACOS/void"

          # Copy icon if available
          if [ -f assets/icon.png ]; then
            cp assets/icon.png "$RESOURCES/icon.png"
          fi

          # Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$CONTENTS/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Void</string>
              <key>CFBundleDisplayName</key>
              <string>Void</string>
              <key>CFBundleIdentifier</key>
              <string>sh.void.terminal</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>void</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>icon</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST

          # Create .dmg
          DMG_NAME="Void-${VERSION}-${{ matrix.arch }}.dmg"
          mkdir -p dmg-stage
          cp -r "$APP" dmg-stage/
          ln -s /Applications dmg-stage/Applications

          hdiutil create -volname "Void" \
            -srcfolder dmg-stage \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"
      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-dmg-${{ matrix.arch }}
          path: "*.dmg"

  # ── Linux .deb ──────────────────────────────────────────────────────
  package-linux:
    needs: build-local-artifacts
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-${{ matrix.target }}
          path: dist-artifacts/
          merge-multiple: true
      - name: Create .deb package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_NAME="void-terminal_${VERSION}_${{ matrix.arch }}"
          PKG_DIR="$PKG_NAME"

          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          # Find binary
          BINARY=$(find dist-artifacts -name "void" -type f | head -1)
          if [ -z "$BINARY" ]; then
            TARBALL=$(find dist-artifacts -name "*.tar.gz" -o -name "*.tar.xz" | head -1)
            mkdir -p extracted
            tar xf "$TARBALL" -C extracted
            BINARY=$(find extracted -name "void" -type f | head -1)
          fi

          cp "$BINARY" "$PKG_DIR/usr/bin/void"
          chmod +x "$PKG_DIR/usr/bin/void"

          # Icon
          if [ -f assets/icon.png ]; then
            cp assets/icon.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/void.png"
          fi

          # Desktop entry
          cat > "$PKG_DIR/usr/share/applications/void.desktop" << DESKTOP
          [Desktop Entry]
          Name=Void
          Comment=Infinite Canvas Terminal
          Exec=void
          Icon=void
          Terminal=false
          Type=Application
          Categories=System;TerminalEmulator;
          Keywords=terminal;console;shell;canvas;
          DESKTOP

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" << CONTROL
          Package: void-terminal
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Depends: libasound2, libx11-6, libxcursor1, libxi6, libxrandr2, libxkbcommon0, libwayland-client0
          Maintainer: 190km <190km@void.sh>
          Description: Infinite Canvas Terminal
           GPU-accelerated terminal emulator with an infinite 2D canvas.
           Place terminals anywhere with pan and zoom navigation.
          Homepage: https://void.sh
          CONTROL

          dpkg-deb --build "$PKG_DIR"
          echo "DEB_PATH=${PKG_NAME}.deb" >> "$GITHUB_ENV"
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-deb-${{ matrix.arch }}
          path: "*.deb"

  # ── Publish GitHub Release ──────────────────────────────────────────
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - package-macos
      - package-linux
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v4
        with:
          name: cargo-dist-bin
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      - name: Fetch all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host --tag="${{ needs.plan.outputs.tag }}" --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "manifest=$(jq -c '.' dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Upload dist manifest
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup manifests
        shell: bash
        run: rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: ${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}
          RELEASE_COMMIT: ${{ github.sha }}
        shell: bash
        run: |
          gh release create "${{ needs.plan.outputs.tag }}" \
            --target "$RELEASE_COMMIT" \
            --title "${{ needs.plan.outputs.tag }}" \
            --generate-notes \
            --fail-on-no-commits \
            $PRERELEASE_FLAG \
            artifacts/*
