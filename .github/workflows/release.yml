name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Create draft release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION → tag: v$VERSION"

      - name: Fail if tag already exists
        run: |
          TAG="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG already exists. Bump the version in Cargo.toml first."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --draft \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target "${{ github.sha }}"

  # ── Build Windows + MSI installer ─────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.create-release.outputs.version }}
      TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Build MSI installer
        shell: pwsh
        run: |
          $wixBin = "${env:WIX}bin"
          if (-not (Test-Path "$wixBin\candle.exe")) {
            Write-Host "WiX not found at default path, installing via choco..."
            choco install wixtoolset -y --no-progress
            $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          }

          $binaryDir = "$PWD\target\x86_64-pc-windows-msvc\release"

          Write-Host "Binary: $binaryDir\void.exe"
          Write-Host "Version: $env:VERSION"

          New-Item -ItemType Directory -Path wix\build -Force | Out-Null

          # Compile WXS files
          & "$wixBin\candle.exe" `
            "-dVersion=$env:VERSION" `
            "-dBinaryDir=$binaryDir" `
            -o wix\build\ `
            wix\main.wxs `
            wix\shortcuts.wxs

          if ($LASTEXITCODE -ne 0) { throw "candle.exe failed" }

          # Link into MSI
          & "$wixBin\light.exe" `
            wix\build\main.wixobj `
            wix\build\shortcuts.wixobj `
            -o "void-$env:VERSION-x86_64.msi" `
            -spdb

          if ($LASTEXITCODE -ne 0) { throw "light.exe failed" }

          Write-Host "MSI created: void-$env:VERSION-x86_64.msi"
          Get-Item "void-$env:VERSION-x86_64.msi" | Select-Object Name, Length

      - name: Upload MSI to release
        shell: bash
        run: |
          gh release upload "$TAG" "void-${VERSION}-x86_64.msi" --clobber

  # ── Publish the release ───────────────────────────────────────────
  publish-release:
    needs:
      - create-release
      - build-windows
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
